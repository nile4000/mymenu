quarkus.native.additional-build-args=${QUARKUS_NATIVE_ADDITIONAL_BUILD_ARGS}
OPENAI_MODEL=gpt-3.5-turbo-0125
OPENAI_MODEL_CATEGORIZATION=${OPENAI_MODEL}
OPENAI_MODEL_UNIT=${OPENAI_MODEL}
OPENAI_MODEL_RECIPE=${OPENAI_MODEL}
OPENAI_TEMPERATURE=0.3
OPENAI_TEMPERATURE_RECIPE=${OPENAI_TEMPERATURE}
OPENAI_API_KEY=${OPENAI_API_KEY}
# Security settings
quarkus.http.cors=true
quarkus.http.cors.origins=${QUARKUS_HTTP_CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
quarkus.http.cors.headers=${QUARKUS_HTTP_CORS_HEADERS:accept,authorization,content-type,origin,x-requested-with}
quarkus.http.cors.exposed-headers=${QUARKUS_HTTP_CORS_EXPOSED_HEADERS:location,content-disposition}
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.port=8080
quarkus.http.auth.basic=false
SUPERCARD_SESSION_ENC_KEY=${APP_SUPERCARD_SESSION_ENC_KEY:9ecfQ1u9mQ9Q2K4LrWzWqf8d7YhK0x4bV3cJ5nT6pAs=}
SUPERCARD_DB_URL=jdbc:postgresql://127.0.0.1:54322/postgres
SUPERCARD_DB_USER=postgres
SUPERCARD_DB_PASSWORD=postgres
# swagger config
quarkus.smallrye-openapi.path=/swagger
# Logging
quarkus.log.level=INFO
