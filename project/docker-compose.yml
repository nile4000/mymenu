services:
  categorization-service:
    build: ./categorization-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      EMBEDDING_SERVICE_URL: http://categorization-service:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      categorization-service:
        condition: service_healthy
