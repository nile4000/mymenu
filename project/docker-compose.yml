services:
  categorization-srv:
    build: ./categorization-srv
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  middleware:
    build: ./middleware
    ports:
      - "8080:8080"
    environment:
      EMBEDDING_SERVICE_URL: http://categorization-srv:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      categorization-srv:
        condition: service_healthy
