app = 'mymenu-categorization'
primary_region = 'cdg'

[build]
  dockerfile = 'categorization-srv/Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
